name: Gravity Test Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run build
        run: echo "Building..."

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Testing..."

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [test]
    steps:
      - name: Deploying
        run: echo "Deploying to cloud..."
