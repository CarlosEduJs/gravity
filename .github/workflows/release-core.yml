name: Release Core

on:
  push:
    tags:
      - 'core/v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: packages/core/go.mod

      - name: Create Release
        run: |
          ./scripts/release.core.sh --tag ${{ github.ref_name }}