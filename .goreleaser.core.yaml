project_name: gravity-core

before:
  hooks:
    - go mod tidy

builds:
  - id: core
    dir: packages/core
    main: ./cmd/gravity-core
    binary: gravity-core
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X g-core/internal/version.Version={{ .Version }}
      - -X g-core/internal/version.BuildDate={{ .Date }}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'